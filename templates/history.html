<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Trade History - GVN Algo</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #1a73e8; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #eee; text-align: left; }
        th { background: #f8f9fa; }
        .buy { color: green; font-weight: bold; }
        .sell { color: red; font-weight: bold; }
        .pnl-box { background: #e8f0fe; padding: 15px; border-radius: 8px; margin-top: 20px; font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <h1>📊 Today's Trade History</h1>
    <table>
        <thead>
            <tr>
                <th>Time (IST)</th>
                <th>Symbol</th>
                <th>Type</th>
                <th>Points</th>
                <th>PnL (INR)</th>
            </tr>
        </thead>
        <tbody>
            {% for t in trades %}
            <tr>
                <td>{{ t.timestamp.strftime('%H:%M:%S') }}</td>
                <td>{{ t.symbol }}</td>
                <td class="{{ t.trade_type.lower() }}">{{ t.trade_type }}</td>
                <td>{{ t.points }}</td>
                <td style="color: {{ 'green' if t.pnl > 0 else 'red' }}">₹ {{ t.pnl }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <div class="pnl-box">Total Today's P&L: ₹ {{ total_pnl }}</div>
</div>
</body>
</html>
