<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GVN Algo - Login</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%); height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; color: #333; }
        .card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #1a73e8; margin-bottom: 5px; }
        .flash-msg { background: #fee2e2; color: #dc2626; padding: 10px; border-radius: 8px; font-size: 14px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background: #1a73e8; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #1557b0; }
        .register-link { margin-top: 20px; display: block; color: #666; text-decoration: none; font-size: 14px; }
        .register-link b { color: #1a73e8; }
    </style>
</head>
<body>

<div class="card">
    <h2>Welcome Back!</h2>
    <p>ముందుగా రిజిస్టర్ అయిన వారు ఇక్కడ లాగిన్ అవ్వండి.</p>

    <!-- Flash Messages -->
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <div class="flash-msg">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    
    <form action="/login" method="POST">
        <input type="text" name="identifier" placeholder="Phone or Email" required>
        <button type="submit">Open My Dashboard</button>
    </form>

    <a href="/demo-register" class="register-link">New joiner? <b>Register Free Demo</b></a>
</div>

</body>
</html>
