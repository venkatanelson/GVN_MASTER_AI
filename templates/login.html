<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GVN Algo - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a73e8;
            --accent: #00d2ff;
            --bg-gradient: linear-gradient(135deg, #1a73e8 0%, #00d2ff 100%);
        }
        body { 
            font-family: 'Outfit', sans-serif; 
            background: var(--bg-gradient); 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin: 0; 
            overflow: hidden;
        }
        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }
        .card { 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(10px);
            padding: 40px; 
            border-radius: 24px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.15); 
            text-align: center; 
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .logo { font-size: 32px; font-weight: 800; color: var(--primary); margin-bottom: 5px; letter-spacing: -1px; }
        h2 { color: #202124; margin-top: 5px; font-weight: 600; font-size: 22px; }
        p { color: #5f6368; font-size: 15px; margin-bottom: 25px; }

        .input-group { text-align: left; margin-bottom: 20px; }
        label { font-size: 13px; font-weight: 600; color: #5f6368; margin-bottom: 8px; display: block; margin-left: 5px; }
        input { 
            width: 100%; 
            padding: 14px 18px; 
            border: 2px solid #f1f3f4; 
            border-radius: 14px; 
            box-sizing: border-box; 
            font-size: 16px; 
            background: #f8f9fa;
            transition: all 0.3s;
            font-family: inherit;
        }
        input:focus { border-color: var(--primary); background: #fff; outline: none; box-shadow: 0 0 0 4px rgba(26, 115, 232, 0.1); }
        
        button { 
            width: 100%; 
            padding: 15px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 14px; 
            font-size: 18px; 
            font-weight: 700; 
            cursor: pointer; 
            transition: 0.3s; 
            margin-top: 10px; 
            box-shadow: 0 8px 20px rgba(26, 115, 232, 0.3);
        }
        button:hover { background: #1557b0; transform: translateY(-2px); box-shadow: 0 10px 25px rgba(26, 115, 232, 0.4); }
        
        .register-link { margin-top: 25px; display: block; color: #5f6368; text-decoration: none; font-size: 14px; font-weight: 500; }
        .register-link b { color: var(--primary); }

        .flash-msg { 
            background: #fff3cd; 
            color: #856404; 
            padding: 10px; 
            border-radius: 10px; 
            margin-bottom: 20px; 
            font-size: 13px; 
            border: 1px solid #ffeeba;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="card">
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="flash-msg">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <div class="logo">GVN ALGO</div>
        <h2>Welcome Back</h2>
        <p>మీ వివరాలు ఎంటర్ చేసి డాష్‌బోర్డ్ వెళ్ళండి.</p>
        
        <form action="/login" method="POST">
            <div class="input-group">
                <label>Email or Phone Number</label>
                <input type="text" name="identifier" placeholder="eg. 9876543210 or name@email.com" required>
            </div>
            
            <button type="submit">Access Dashboard</button>
        </form>
    
        <a href="/demo-register" class="register-link">Don't have an account? <b>Start Free Demo</b></a>
    </div>
</div>

</body>
</html>
