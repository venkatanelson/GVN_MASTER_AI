<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GVN Algo - Registration</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a73e8;
            --accent: #00d2ff;
            --bg-gradient: linear-gradient(135deg, #1a73e8 0%, #00d2ff 100%);
        }
        body { 
            font-family: 'Outfit', sans-serif; 
            background: var(--bg-gradient); 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin: 0; 
            overflow: hidden;
        }
        .register-container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }
        .card { 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(10px);
            padding: 40px; 
            border-radius: 24px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.15); 
            text-align: center; 
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .logo { font-size: 32px; font-weight: 800; color: var(--primary); margin-bottom: 5px; letter-spacing: -1px; }
        h2 { color: #202124; margin-top: 5px; font-weight: 600; font-size: 22px; }
        p { color: #5f6368; font-size: 15px; margin-bottom: 25px; }

        .input-group { text-align: left; margin-bottom: 15px; }
        label { font-size: 13px; font-weight: 600; color: #5f6368; margin-bottom: 5px; display: block; margin-left: 5px; }
        input { 
            width: 100%; 
            padding: 14px 18px; 
            border: 2px solid #f1f3f4; 
            border-radius: 14px; 
            box-sizing: border-box; 
            font-size: 16px; 
            background: #f8f9fa;
            transition: all 0.3s;
            font-family: inherit;
        }
        input:focus { border-color: var(--primary); background: #fff; outline: none; box-shadow: 0 0 0 4px rgba(26, 115, 232, 0.1); }
        
        button { 
            width: 100%; 
            padding: 15px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 14px; 
            font-size: 18px; 
            font-weight: 700; 
            cursor: pointer; 
            transition: 0.3s; 
            margin-top: 15px; 
            box-shadow: 0 8px 20px rgba(26, 115, 232, 0.3);
        }
        button:hover { background: #1557b0; transform: translateY(-2px); box-shadow: 0 10px 25px rgba(26, 115, 232, 0.4); }
        button:active { transform: translateY(0); }

        .login-link { margin-top: 25px; display: block; color: #5f6368; text-decoration: none; font-size: 14px; font-weight: 500; }
        .login-link b { color: var(--primary); }
        
        .offer-tag { 
            background: #e8f0fe; 
            color: var(--primary); 
            padding: 6px 14px; 
            border-radius: 50px; 
            font-size: 12px; 
            font-weight: 700; 
            margin-bottom: 20px; 
            display: inline-block; 
            letter-spacing: 0.5px;
        }

        /* Float animations for background flavor */
        .circle { position: absolute; border-radius: 50%; background: rgba(255,255,255,0.1); z-index: -1; animation: float 10s infinite alternate; }
        @keyframes float { from { transform: translate(0,0); } to { transform: translate(20px, 40px); } }
    </style>
</head>
<body>

<div class="circle" style="width: 300px; height: 300px; top: -100px; left: -100px;"></div>
<div class="circle" style="width: 200px; height: 200px; bottom: -50px; right: -50px; animation-duration: 7s;"></div>

<div class="register-container">
    <div class="card">
        <div class="offer-tag">✨ FREE 7-DAY DEMO TRIAL</div>
        <div class="logo">GVN ALGO</div>
        <h2>Start Smart Trading</h2>
        <p>మీ వివరాలు ఎంటర్ చేసి అల్గో ట్రేడింగ్ ప్రారంభించండి.</p>
        
        <form action="/demo-register" method="POST">
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" name="username" placeholder="eg. Gvn Rao" required>
            </div>
            
            <div class="input-group">
                <label>Phone Number</label>
                <input type="text" name="phone" placeholder="+91 9xxx-xxx-xxx" required>
            </div>
            
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="name@example.com" required>
            </div>
            
            <div class="input-group">
                <label>Demo Capital (₹50,000 - ₹1,00,000)</label>
                <input type="number" name="demo_capital" min="50000" max="100000" value="50000" required>
            </div>
            
            <button type="submit">Create Free Account</button>
        </form>
    
        <a href="/login" class="login-link">Already have an account? <b>Login Here</b></a>
    </div>
</div>

</body>
</html>
