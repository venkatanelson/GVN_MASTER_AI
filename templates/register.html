<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GVN Algo - Registration</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%); height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; color: #333; }
        .card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #1a73e8; margin-bottom: 10px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background: #1a73e8; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #1557b0; }
        .login-link { margin-top: 20px; display: block; color: #666; text-decoration: none; font-size: 14px; }
        .login-link b { color: #1a73e8; }
        .offer-tag { background: #e8f0fe; color: #1a73e8; padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; margin-bottom: 20px; display: inline-block; }
    </style>
</head>
<body>

<div class="card">
    <div class="offer-tag">✨ FREE 7-DAY DEMO TRIAL</div>
    <h2>Start Trading</h2>
    <p>మీ వివరాలు ఎంటర్ చేసి అల్గో ట్రేడింగ్ ప్రారంభించండి.</p>
    
    <form action="/demo-register" method="POST">
        <input type="text" name="username" placeholder="Full Name" required>
        <input type="text" name="phone" placeholder="Phone Number" required>
        <input type="email" name="email" placeholder="Email Address" required>
        <label style="font-size: 13px; color: #666; display: block; text-align: left; margin-top: 10px;">Demo Capital (₹50,000 - ₹1,00,000):</label>
        <input type="number" name="demo_capital" min="50000" max="100000" value="50000" required>
        
        <button type="submit">Create Demo Account</button>
    </form>

    <a href="/login" class="login-link">Already have an account? <b>Login Here</b></a>
</div>

</body>
</html>
